openapi: 3.0.3
info:
  title: Autointel Diagnostics API
  version: 1.0.1
  description: API for Autointel Diagnostics - Vehicle Maintenance and Diagnostic
    Management System
  contact:
    email: maruf.bshs@gmail.com
  license:
    name: BSD License
paths:
  /api/user/auth/google/login/:
    post:
      operationId: user_auth_google_login_create
      description: Handle Google OAuth mobile login and return authentication tokens.
      summary: Google OAuth Mobile Login
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleOAuthRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GoogleOAuthRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GoogleOAuthRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: Google login successful
        '400':
          description: OAuth validation failed
  /api/user/auth/apple/login/:
    post:
      operationId: user_auth_apple_login_create
      description: Accepts Apple ID token and returns JWT tokens.
      summary: Apple mobile login
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppleOAuthRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AppleOAuthRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AppleOAuthRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: Login successful
  /api/user/register/initiate/:
    post:
      operationId: user_register_initiate_create
      description: Send OTP to email for user registration verification
      summary: Initiate user registration
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiateRegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/InitiateRegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/InitiateRegistrationRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitiateRegistration'
          description: ''
  /api/user/register/verify/:
    post:
      operationId: user_register_verify_create
      description: Verifies the OTP sent during registration and completes user registration.
      summary: Verify registration OTP
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyRegistrationOTPRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyRegistrationOTPRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyRegistrationOTPRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyRegistrationOTP'
          description: ''
  /api/user/password-reset/initiate/:
    post:
      operationId: user_password_reset_initiate_create
      description: Send OTP to email for password reset
      summary: Initiate password reset
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiatePasswordResetRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/InitiatePasswordResetRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/InitiatePasswordResetRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitiatePasswordReset'
          description: ''
  /api/user/password-reset/verify/:
    post:
      operationId: user_password_reset_verify_create
      description: Verify OTP and receive reset token for password change
      summary: Verify password reset OTP
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyPasswordResetOTPRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyPasswordResetOTPRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyPasswordResetOTPRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyPasswordResetOTP'
          description: ''
  /api/user/password-reset/confirm/:
    post:
      operationId: user_password_reset_confirm_create
      description: Reset password using the reset token
      summary: Reset password
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetPassword'
          description: ''
  /api/user/login/:
    post:
      operationId: user_login_create
      description: Authenticate user and return access and refresh tokens.
      summary: User login
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserLogin'
          description: ''
  /api/user/logout/:
    post:
      operationId: user_logout_create
      description: Logout user by blacklisting refresh token and clearing session.
      summary: User logout
      tags:
      - user
      security:
      - jwtAuth: []
      responses:
        '205':
          description: Logged out successfully
  /api/user/me/:
    get:
      operationId: user_me_retrieve
      description: Retrieve currently authenticated user's profile.
      summary: Retrieve my profile
      tags:
      - user
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    put:
      operationId: user_me_update
      description: Fully update your profile.
      summary: Update my profile
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserProfileRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    patch:
      operationId: user_me_partial_update
      description: Partially update your profile fields.
      summary: Partially update my profile
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    delete:
      operationId: user_me_destroy
      description: Delete currently authenticated user's account.
      summary: Delete my account
      tags:
      - user
      security:
      - jwtAuth: []
      responses:
        '204':
          description: Account deleted
  /api/user/profile/{id}/:
    get:
      operationId: user_profile_retrieve
      description: Retrieve public profile information of a user by ID.
      summary: Retrieve public user profile
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - user
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /api/user/approve/{id}/:
    get:
      operationId: user_approve_retrieve
      description: Retrieve a single user by ID for approval review
      summary: Retrieve user for approval
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserApproval'
          description: ''
    put:
      operationId: user_approve_update
      description: Fully update user approval status (admin use)
      summary: Update user approval
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserApprovalRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserApprovalRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserApprovalRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserApproval'
          description: ''
    patch:
      operationId: user_approve_partial_update
      description: Partially update approval-related fields
      summary: Partially update user approval
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserApprovalRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserApprovalRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserApprovalRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserApproval'
          description: ''
    delete:
      operationId: user_approve_destroy
      description: Delete user account permanently
      summary: Delete user
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/user/total/:
    get:
      operationId: user_total_retrieve
      description: Return total number of registered users.
      summary: Total users count
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TotalUsersCountResponse'
          description: ''
  /api/user/admin/login/:
    post:
      operationId: user_admin_login_create
      description: Authenticate admin user and return JWT tokens.
      summary: Admin login
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLogin'
          description: ''
  /api/user/admin/profile/:
    get:
      operationId: user_admin_profile_retrieve
      description: Retrieve currently authenticated admin profile.
      summary: Retrieve admin profile
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfile'
          description: ''
    put:
      operationId: user_admin_profile_update
      description: Fully update admin profile.
      summary: Update admin profile
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminProfileRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfile'
          description: ''
    patch:
      operationId: user_admin_profile_partial_update
      description: Partially update admin profile fields.
      summary: Partially update admin profile
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAdminProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAdminProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAdminProfileRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfile'
          description: ''
  /api/user/admin/userlist/:
    get:
      operationId: user_admin_userlist_list
      description: Retrieve a list of all registered users with filtering and ordering
        options.
      summary: Admin user list
      parameters:
      - in: query
        name: is_active
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: provider
        schema:
          type: string
          enum:
          - apple
          - google
          - self
        description: |-
          * `self` - Self
          * `google` - Google
          * `apple` - Apple
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: tier
        schema:
          type: string
          enum:
          - free
          - premium
        description: |-
          * `free` - Free
          * `premium` - Premium
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserList'
          description: ''
  /api/user/stats/:
    get:
      operationId: user_stats_retrieve
      description: Return monthly user registration statistics for a given year.
      summary: Yearly user growth statistics
      parameters:
      - in: query
        name: year
        schema:
          type: integer
        description: Year for statistics (e.g., 2025)
        required: true
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YearlyUserGrowth'
          description: ''
        '400':
          description: Invalid or missing year parameter
  /api/maintenance/tasks/:
    post:
      operationId: maintenance_tasks_create
      description: Create a new manual maintenance task for the authenticated user.
        A notification will be triggered upon successful creation.
      summary: Create maintenance task
      tags:
      - maintenance
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualMaintenanceTaskCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ManualMaintenanceTaskCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ManualMaintenanceTaskCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManualMaintenanceTaskCreate'
          description: ''
    get:
      operationId: maintenance_tasks_list
      description: Retrieve a paginated list of maintenance tasks belonging to the
        authenticated user. Supports filtering by status, vehicle, and completion
        state. Supports search by service type and ordering by next due date or creation
        date.
      summary: List maintenance tasks
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - maintenance
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedManualMaintenanceTaskListList'
          description: ''
  /api/maintenance/tasks/stats/:
    get:
      operationId: maintenance_tasks_stats_retrieve
      description: Retrieve statistics for the authenticated user's maintenance tasks,
        including total, upcoming, overdue, and completed counts.
      summary: Get maintenance statistics
      tags:
      - maintenance
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  upcoming:
                    type: integer
                  overdue:
                    type: integer
                  completed:
                    type: integer
          description: ''
  /api/maintenance/tasks/{id}/:
    patch:
      operationId: maintenance_tasks_partial_update
      description: Partially update fields of an existing maintenance task.
      summary: Partially update maintenance task
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - maintenance
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedManualMaintenanceTaskUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedManualMaintenanceTaskUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedManualMaintenanceTaskUpdateRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManualMaintenanceTaskUpdate'
          description: ''
    get:
      operationId: maintenance_tasks_retrieve
      description: Retrieve detailed information about a specific maintenance task
        owned by the authenticated user.
      summary: Retrieve maintenance task
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - maintenance
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManualMaintenanceTask'
          description: ''
    put:
      operationId: maintenance_tasks_update
      description: Fully update an existing maintenance task. Only tasks belonging
        to the authenticated user can be modified.
      summary: Update maintenance task
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - maintenance
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualMaintenanceTaskUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ManualMaintenanceTaskUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ManualMaintenanceTaskUpdateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManualMaintenanceTaskUpdate'
          description: ''
    delete:
      operationId: maintenance_tasks_destroy
      description: Delete a maintenance task owned by the authenticated user.
      summary: Delete maintenance task
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - maintenance
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/maintenance/tasks/{id}/mark-completed/:
    patch:
      operationId: maintenance_tasks_mark_completed_partial_update
      description: Mark a specific maintenance task as completed or incomplete. Triggers
        a completion notification if marked as completed. Returns the full updated
        task details.
      summary: Mark task as completed
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - maintenance
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedMarkTaskCompletedRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedMarkTaskCompletedRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedMarkTaskCompletedRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarkTaskCompleted'
          description: ''
  /api/supports/contact/:
    get:
      operationId: supports_contact_list
      description: Admin can retrieve a list of all support tickets submitted by users.
        Supports filtering by user or email, searching by email/username, and ordering
        by creation date.
      summary: List all support requests
      parameters:
      - in: query
        name: email
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: user
        schema:
          type: string
          format: uuid
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedListContactSupportList'
          description: ''
  /api/supports/contact/{id}/:
    get:
      operationId: supports_contact_retrieve
      description: Retrieve the details of a specific support ticket by its ID. Admin
        only.
      summary: Get a specific support request
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Contact Support.
        required: true
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListContactSupport'
          description: ''
  /api/supports/faqs/:
    get:
      operationId: supports_faqs_list
      description: Retrieve a list of frequently asked questions. Supports searching
        by question/answer and ordering by creation or update date.
      summary: List FAQs
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - supports
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFAQListList'
          description: ''
  /api/supports/faqs/{id}/:
    get:
