components:
  schemas:
    AboutUs:
      type: object
      properties:
        content:
          type: string
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - content
      - updated_at
    AdminLogin:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    AdminLoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - email
      - password
    AdminProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        full_name:
          type: string
          maxLength: 40
        email:
          type: string
          format: email
          readOnly: true
        phone:
          type: string
          nullable: true
          title: Phone Number
          maxLength: 128
        profile_picture:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - email
      - full_name
      - id
      - updated_at
    AdminProfileRequest:
      type: object
      properties:
        full_name:
          type: string
          minLength: 1
          maxLength: 40
        phone:
          type: string
          nullable: true
          title: Phone Number
          maxLength: 128
        profile_picture:
          type: string
          format: binary
          nullable: true
      required:
      - full_name
    AdminUserVehicleList:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        full_name:
          type: string
          maxLength: 40
        email:
          type: string
          format: email
          maxLength: 254
        profile_picture:
          type: string
          format: uri
          nullable: true
        user_vehicles:
          type: array
          items:
            $ref: '#/components/schemas/VehicleList'
      required:
      - email
      - full_name
      - id
      - user_vehicles
    AdminVehicleList:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user_email:
          type: string
          format: email
          readOnly: true
        user_name:
          type: string
          readOnly: true
        manufacturer:
          type: string
          readOnly: true
        model:
          type: string
          readOnly: true
        year:
          type: integer
          readOnly: true
        fuel_type:
          type: string
          readOnly: true
        engine_size:
          type: string
          readOnly: true
          description: e.g., 2.0L, 1500cc
        vehicle_name:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - engine_size
      - fuel_type
      - id
      - manufacturer
      - model
      - user_email
      - user_name
      - vehicle_name
      - year
    AppleOAuthRequest:
      type: object
      properties:
        id_token:
          type: string
          minLength: 1
        user: {}
      required:
      - id_token
    ChatMessage:
      type: object
      description: Serializer for chat messages
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user_message:
          type: string
          readOnly: true
        ai_response:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - ai_response
      - created_at
      - id
      - user_message
    ChatRequestRequest:
      type: object
      description: Serializer for creating chat message
      properties:
        session_id:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1
      required:
      - message
      - session_id
    CreateContactSupport:
      type: object
      properties:
        subject:
          type: string
          description: Short title of your issue
          maxLength: 255
        email:
          type: string
          format: email
          description: Write your email
          maxLength: 254
        message:
          type: string
          description: Please explain what happened...
      required:
      - email
      - message
      - subject
    CreateContactSupportRequest:
      type: object
      properties:
        subject:
          type: string
          minLength: 1
          description: Short title of your issue
          maxLength: 255
        email:
          type: string
          format: email
          minLength: 1
          description: Write your email
          maxLength: 254
        message:
          type: string
          minLength: 1
          description: Please explain what happened...
      required:
      - email
      - message
      - subject
    DeviceTypeEnum:
      enum:
      - ios
      - android
      type: string
      description: |-
        * `ios` - iOS
        * `android` - Android
    DiagnosticRequest:
      type: object
      description: Serializer for diagnostic request with response
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        vehicle:
          type: string
          format: uuid
        vehicle_name:
          type: string
          readOnly: true
        session_id:
          type: string
          readOnly: true
          description: Session ID from AI diagnostic service
        diagnostic_codes:
          description: OBD-II codes (e.g., ["P0300", "P0171"])
        symptoms:
          description: User-described symptoms
        tier:
          allOf:
          - $ref: '#/components/schemas/Tier8a9Enum'
          readOnly: true
          description: |-
            Tier used for this diagnosis (free or full)

            * `free` - Free
            * `full` - Full
        tier_display:
          type: string
          readOnly: true
        is_unlocked:
          type: boolean
          readOnly: true
          description: True if user paid to unlock this specific session
        has_full_access:
          type: boolean
          readOnly: true
        response:
          allOf:
          - $ref: '#/components/schemas/DiagnosticResponse'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - diagnostic_codes
      - has_full_access
      - id
      - is_unlocked
      - response
      - session_id
      - symptoms
      - tier
      - tier_display
      - vehicle
      - vehicle_name
    DiagnosticRequestCreateRequest:
      type: object
      description: |-
        Serializer for creating diagnostic request
        User provides: vehicle, codes, symptoms
      properties:
        vehicle:
          type: string
          format: uuid
          description: Vehicle ID
        diagnostic_codes:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 20
          description: List of OBD-II codes
          minItems: 1
        symptoms:
          type: string
          minLength: 5
          description: Description of symptoms
      required:
      - diagnostic_codes
      - symptoms
      - vehicle
    DiagnosticRequestList:
      type: object
      description: Simplified serializer for diagnostic list
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        vehicle:
          type: string
          format: uuid
        vehicle_name:
          type: string
          readOnly: true
        session_id:
          type: string
          description: Session ID from AI diagnostic service
          maxLength: 255
        diagnostic_codes:
          description: OBD-II codes (e.g., ["P0300", "P0171"])
        tier:
          allOf:
          - $ref: '#/components/schemas/Tier8a9Enum'
          description: |-
            Tier used for this diagnosis (free or full)

            * `free` - Free
            * `full` - Full
        tier_display:
          type: string
          readOnly: true
        is_unlocked:
          type: boolean
          description: True if user paid to unlock this specific session
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - diagnostic_codes
      - id
      - session_id
      - tier_display
      - vehicle
      - vehicle_name
    DiagnosticResponse:
      type: object
      description: Serializer for diagnostic response
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        response:
          readOnly: true
          description: Complete AI response stored as JSON
        tier:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - response
      - tier
    FAQ:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        question:
          type: string
          maxLength: 500
